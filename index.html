<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aleena's site</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 13px;
    }

    #output div {
      white-space: pre-wrap;
      word-break: break-word;
      color: #6ab0f5;
}

    a {
      color: #fff;
      text-decoration: underline;
    }
    a:hover { color: #fff; }
    
    
    .prompt-line {
      display: flex;
      align-items: center;
      margin-top: 2px;
    }

    .prompt-arrow {
      margin-right: 6px;
      user-select: none;
      flex-shrink: 0;
    }

    #input-field {
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      flex: 1;
      caret-color: #fff;
    }
  </style>
</head>
<body>
  <div id="output"></div>
  <div class="prompt-line">
    <span class="prompt-arrow">»</span>
    <input id="input-field" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus />
  </div>

<script>
const output = document.getElementById('output');
const input  = document.getElementById('input-field');

document.addEventListener('click', () => input.focus());

// ── Commands ──────────────────────────────────────────────────────────────────

const COMMANDS = {
  help: () => {
    print("about:   learn about me");
    print("email:   contact me (I'd love to hear from you!)");
    print("github:  see my github page");
    print("project: learn about my past projects");
  },

  about: () => {
  print("a computational conservationist, backpacker, matcha enthusiast, wannabe surfer, and much more to come");
},
  
  email: () => {
    print("i would love to hear from you! you can contact me at ", false);
    printLink("aleenamunshi001@g.ucla.edu", "mailto:aleenamunshi001@g.ucla.edu");
  },

  github: () => {
    print("check out my github at ", false);
    printLink("https://github.com/aleenabean", "https://github.com/aleenabean?tab=repositories");
  },

  project: (args) => {
    if (!args) {
      print("a few of my projects are");
      
      const p = document.createElement('div');
      p.style.color = '#a8d8ea';
      p.textContent = 'Grether coexistence app';
      output.appendChild(p);
      
      const p2 = document.createElement('div');
      p2.style.color = '#a8d8ea';
      p2.textContent = 'species distribution model (sdm) comparison app';
      output.appendChild(p2);

      const p3 = document.createElement('div');
      p3.style.color = '#a8d8ea';
      p3.textContent = 'Peruvian bird bioacoustics research';
      output.appendChild(p3);
      
      print("type project [project_name] to find out more");
      return;
    }
    const name = args.toLowerCase().replace(/[-_\s]/g, '');
    if (name.includes('grether') || name.includes('coexist')) {
      print("Research on species coexistence and extinction dynamics, applying ecological theory to empirical data.");
      print("see it at ", false);
      printLink("github.com/aleenabean/Grether-coexistence-extinction", "https://github.com/aleenabean/Grether-coexistence-extinction");
    } else if (name.includes('sdm') || name.includes('comparison')) {
      print("A species distribution model (SDM) comparison app visualizing and benchmarking different modeling approaches.");
      print("see it at ", false);
      printLink("github.com/aleenabean/sdm-comparison-app", "https://github.com/aleenabean/sdm-comparison-app");
    } else if (name.includes('peruvian') || name.includes('bioacoustics')) {
      print("Using BirdNET to analyze Peruvian bird acoustics data in regions with local mining sites.");
      print("see it at ", false);
      printLink("github.com/aleenabean/peru-birdNET", "https://github.com/aleenabean/peru-birdNET");
    } else {
      print("project not found: " + args);
    }
  },

  clear: () => {
    output.innerHTML = '';
    COMMANDS.help();
  },
};

// ── Print helpers ─────────────────────────────────────────────────────────────

let currentLine = null;

function print(text, newline = true) {
  if (currentLine && !newline) {
    currentLine.appendChild(document.createTextNode(text));
    return;
  }
  currentLine = null;
  const div = document.createElement('div');
  div.textContent = text;
  output.appendChild(div);
  if (!newline) currentLine = div;
}

function printLink(label, href) {
  const a = document.createElement('a');
  a.href = href;
  a.textContent = label;
  a.target = '_blank';
  if (currentLine) {
    currentLine.appendChild(a);
    currentLine = null;
  } else {
    const div = document.createElement('div');
    div.appendChild(a);
    output.appendChild(div);
  }
}

// ── Command handling ──────────────────────────────────────────────────────────

const history = [];
let historyIdx = -1;

function handleCommand(raw) {
  const trimmed = raw.trim();
  const echo = document.createElement('div');
  echo.textContent = '» ' + trimmed
  echo.style.color = '#90ee90';
  output.appendChild(echo);
  currentLine = null;

  if (!trimmed) return;

  const parts = trimmed.split(/\s+/);
  const cmd   = parts[0].toLowerCase();
  const args  = parts.slice(1).join(' ') || null;

  if (COMMANDS[cmd]) {
    COMMANDS[cmd](args);
  } else {
    print("command not found: " + trimmed + "  (type help for commands)");
  }

  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const val = input.value;
    if (val.trim()) { history.unshift(val.trim()); historyIdx = -1; }
    handleCommand(val);
    input.value = '';
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIdx < history.length - 1) { historyIdx++; input.value = history[historyIdx]; }
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIdx > 0) { historyIdx--; input.value = history[historyIdx]; }
    else { historyIdx = -1; input.value = ''; }
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    const partial = input.value.trim().toLowerCase();
    const matches = Object.keys(COMMANDS).filter(c => c.startsWith(partial));
    if (matches.length === 1) input.value = matches[0];
  }
});

// ── Boot ──────────────────────────────────────────────────────────────────────
print("welcome to Aleena's personal site!  type help for commands");
input.focus();
</script>
</body>
</html>
