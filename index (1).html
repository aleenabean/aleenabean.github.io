<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aleena's Site</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      font-size: 16px;
      line-height: 1.6;
      padding: 16px;
    }

    #output div {
      white-space: pre-wrap;
      word-break: break-word;
    }

    a {
      color: #4af;
      text-decoration: underline;
    }
    a:hover { color: #7cf; }

    .prompt-line {
      display: flex;
      align-items: center;
      margin-top: 2px;
    }

    .prompt-arrow {
      margin-right: 6px;
      user-select: none;
      flex-shrink: 0;
    }

    #input-field {
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      font-size: 16px;
      flex: 1;
      caret-color: #fff;
    }
  </style>
</head>
<body>
  <div id="output"></div>
  <div class="prompt-line">
    <span class="prompt-arrow">»</span>
    <input id="input-field" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus />
  </div>

<script>
const output = document.getElementById('output');
const input  = document.getElementById('input-field');

document.addEventListener('click', () => input.focus());

// ── Commands ──────────────────────────────────────────────────────────────────

const COMMANDS = {
  help: () => {
    print("Welcome to Aleena's Personal Site!  Type help for commands.");
    print("email:   contact me (I'd love to hear from you!)");
    print("github:  see my github page");
    print("project: learn about my past projects");
  },

  email: () => {
    print("I would love to hear from you! You can contact me at ", false);
    printLink("aleenamunshi@ucla.edu", "mailto:aleenamunshi@ucla.edu");
  },

  github: () => {
    print("Check out my github at ", false);
    printLink("https://github.com/aleenabean", "https://github.com/aleenabean?tab=repositories");
  },

  project: (args) => {
    if (!args) {
      print("A few of my personal projects are");
      print("Grether-coexistence-extinction");
      print("sdm-comparison-app");
      print("Type project [project_name] to find out more!");
      return;
    }
    const name = args.toLowerCase().replace(/[-_\s]/g, '');
    if (name.includes('grether') || name.includes('coexist')) {
      print("Grether-coexistence-extinction");
      print("Research on species coexistence and extinction dynamics,");
      print("applying ecological theory to empirical data.");
      print("See it at ", false);
      printLink("github.com/aleenabean/Grether-coexistence-extinction", "https://github.com/aleenabean/Grether-coexistence-extinction");
    } else if (name.includes('sdm') || name.includes('comparison')) {
      print("sdm-comparison-app");
      print("A species distribution model (SDM) comparison app,");
      print("visualizing and benchmarking different modeling approaches.");
      print("See it at ", false);
      printLink("github.com/aleenabean/sdm-comparison-app", "https://github.com/aleenabean/sdm-comparison-app");
    } else {
      print("project not found: " + args);
    }
  },

  clear: () => {
    output.innerHTML = '';
    COMMANDS.help();
  },
};

// ── Print helpers ─────────────────────────────────────────────────────────────

let currentLine = null;

function print(text, newline = true) {
  if (currentLine && !newline) {
    currentLine.appendChild(document.createTextNode(text));
    return;
  }
  currentLine = null;
  const div = document.createElement('div');
  div.textContent = text;
  output.appendChild(div);
  if (!newline) currentLine = div;
}

function printLink(label, href) {
  const a = document.createElement('a');
  a.href = href;
  a.textContent = label;
  a.target = '_blank';
  if (currentLine) {
    currentLine.appendChild(a);
    currentLine = null;
  } else {
    const div = document.createElement('div');
    div.appendChild(a);
    output.appendChild(div);
  }
}

// ── Command handling ──────────────────────────────────────────────────────────

const history = [];
let historyIdx = -1;

function handleCommand(raw) {
  const trimmed = raw.trim();
  const echo = document.createElement('div');
  echo.textContent = '» ' + trimmed;
  output.appendChild(echo);
  currentLine = null;

  if (!trimmed) return;

  const parts = trimmed.split(/\s+/);
  const cmd   = parts[0].toLowerCase();
  const args  = parts.slice(1).join(' ') || null;

  if (COMMANDS[cmd]) {
    COMMANDS[cmd](args);
  } else {
    print("command not found: " + trimmed + "  (type help for commands)");
  }

  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const val = input.value;
    if (val.trim()) { history.unshift(val.trim()); historyIdx = -1; }
    handleCommand(val);
    input.value = '';
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIdx < history.length - 1) { historyIdx++; input.value = history[historyIdx]; }
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIdx > 0) { historyIdx--; input.value = history[historyIdx]; }
    else { historyIdx = -1; input.value = ''; }
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    const partial = input.value.trim().toLowerCase();
    const matches = Object.keys(COMMANDS).filter(c => c.startsWith(partial));
    if (matches.length === 1) input.value = matches[0];
  }
});

// ── Boot ──────────────────────────────────────────────────────────────────────
print("Welcome to Aleena's Personal Site!  Type help for commands.");
input.focus();
</script>
</body>
</html>
